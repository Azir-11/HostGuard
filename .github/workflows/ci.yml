name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # 不写死版本：action-setup 读取 package.json 的 packageManager 字段，
      # 确保 CI 与本地使用完全一致的 pnpm，避免构建脚本白名单/解析差异。
      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend build (vite + vue-tsc)
        run: pnpm build

      - name: Frontend lint & format
        run: pnpm lint && pnpm format:check

      # 全量打包：tauri build 编译 Rust 并产出各平台安装器，真正验证打包链路
      # （Windows: nsis setup.exe；macOS: app + dmg）。beforeBuildCommand 会先
      # 跑 pnpm build 产出 dist/ 供 tauri::generate_context! 编译期嵌入。
      # 因 tauri.conf.json 开启了 createUpdaterArtifacts，构建会签名更新产物，
      # 需提供签名私钥（同 release.yml 的 Secret）。否则报「no private key」。
      - name: App build (tauri build)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: hostguard-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
