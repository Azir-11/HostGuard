name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # 轻量校验：每次 push / PR 都跑。只用一个 ubuntu runner（最便宜），
  # lint / format / 前端类型检查都与平台无关，秒级~1 分钟，不浪费打包时间。
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Frontend build (vite + vue-tsc)
        run: pnpm build

      - name: Lint & format
        run: pnpm lint && pnpm format:check

  # 全量打包验证（mac + win 矩阵，编译 Rust + 产出安装器，成本高）：
  # 仅在「PR 到 main」或「手动触发 workflow_dispatch」时跑，日常 push 不触发，
  # 避免每次推送都全量打包浪费时间。正式发版由 release.yml 在打 v* tag 时负责。
  package:
    name: package (${{ matrix.os }})
    needs: check
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # createUpdaterArtifacts 已开启 → 构建会签名更新产物，需提供签名私钥
      # （仓库级 Secret，与 release.yml 相同）。
      - name: App build (tauri build)
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: hostguard-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore
